# docker-compose.yml
services:
  postgres:
    image: postgres:16
    container_name: postgres_pet_owner
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: petowner
      POSTGRES_PASSWORD: petowner
      POSTGRES_DB: petownerdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - petowner-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_pet_owner
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - petowner-network

volumes:
  postgres-data:
  pgadmin-data:

networks:
  petowner-network:
